# Netlify configuration file
[build]
  publish = "."

# Serve admin-enhanced.html directly (no redirect)
[[redirects]]
  from = "/admin"
  to = "/admin-enhanced.html"
  status = 200

# SPA redirects for main app (except admin)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
  conditions = {path = "!=/admin-enhanced.html"}
